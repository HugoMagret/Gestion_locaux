<div *ngIf="notification" class="alert-box" [ngClass]="notification.type">
  <div class="alert-content">
    <span class="icon" *ngIf="notification.type === 'error'">⚠️</span>
    <span class="icon" *ngIf="notification.type === 'success'">✅</span>
    <span class="icon" *ngIf="notification.type === 'info'">ℹ️</span>
    <p>{{ notification.message }}</p>
  </div>
  <button class="close-btn" (click)="close()">&times;</button>
</div>
