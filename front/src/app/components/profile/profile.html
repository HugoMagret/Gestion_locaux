<div class="profile-container">
  <div class="profile-card">
    <h2><i class="fa-solid fa-circle-user"></i> Mon Profil</h2>
    <div class="user-info">
      <p><strong>Login :</strong> {{ currentUser?.login }}</p>
      <p><strong>Rôle :</strong> {{ currentUser?.is_admin ? 'Administrateur' : 'Utilisateur' }}</p>
    </div>

    <hr>

    <h3><i class="fa-solid fa-key"></i> Modifier mon mot de passe</h3>
    <form (ngSubmit)="onChangePassword()">
      <div class="form-group">
        <label>Mot de passe actuel</label>
        <input type="password" [(ngModel)]="currentPassword" name="currentPassword" required placeholder="Mot de passe actuel">
      </div>
      <div class="form-group">
        <label>Nouveau mot de passe</label>
        <input type="password" [(ngModel)]="newPassword" name="newPassword" required placeholder="Nouveau mot de passe">
      </div>
      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required placeholder="Confirmer le mot de passe">
      </div>

      <div *ngIf="message" class="success-message">{{ message }}</div>
      <div *ngIf="error" class="error-message">{{ error }}</div>

      <button type="submit" class="btn-save" [disabled]="!newPassword || !confirmPassword">
        <i class="fa-solid fa-floppy-disk"></i> Mettre à jour le mot de passe
      </button>
    </form>
  </div>
</div>
