<app-alert></app-alert>

<ng-container *ngIf="isAuthenticated$ | async; else loginTemplate">
  <nav class="top-nav">
    <div class="nav-brand">GestionLocaux</div>
    <div class="nav-links">
      <button [class.active]="view === 'map'" (click)="view = 'map'"><i class="fa-solid fa-map"></i> Plan 2D</button>
      <button [class.active]="view === 'map3d'" (click)="view = 'map3d'"><i class="fa-solid fa-cube"></i> Plan 3D</button>
      <button [class.active]="view === 'floors'" (click)="view = 'floors'"><i class="fa-solid fa-layer-group"></i> Gestion Étages</button>
      <div class="nav-dropdown">
        <button [class.active]="view === 'rooms' || view === 'staff' || view === 'equipments' || view === 'sockets'"><i class="fa-solid fa-list"></i> Listes Données</button>
        <div class="dropdown-content">
          <button (click)="view = 'rooms'"><i class="fa-solid fa-door-open"></i> Salles</button>
          <button (click)="view = 'staff'"><i class="fa-solid fa-users"></i> Personnel</button>
          <button (click)="view = 'equipments'"><i class="fa-solid fa-box-open"></i> Matériel</button>
          <button (click)="view = 'sockets'"><i class="fa-solid fa-plug"></i> Connectique</button>
        </div>
      </div>
      <div class="nav-dropdown">
        <button [class.active]="view.startsWith('types')"><i class="fa-solid fa-tags"></i> Paramètres Types</button>
        <div class="dropdown-content">
          <button (click)="view = 'types-rooms'">Types de Salles</button>
          <button (click)="view = 'types-equipment'">Types de Matériels</button>
          <button (click)="view = 'types-sockets'">Types de Connectiques</button>
        </div>
      </div>
      <button *ngIf="isAdmin" [class.active]="view === 'users'" (click)="view = 'users'"><i class="fa-solid fa-user-shield"></i> Utilisateurs</button>
      <button [class.active]="view === 'profile'" (click)="view = 'profile'"><i class="fa-solid fa-user"></i> Mon Profil</button>
      <button class="logout-btn" (click)="logout()"><i class="fa-solid fa-right-from-bracket"></i> Déconnexion</button>
    </div>
  </nav>

  <main>
    <app-map *ngIf="view === 'map'" (roomSelected)="onRoomSelected($event)"></app-map>
    <app-map-3d *ngIf="view === 'map3d'" (roomSelected)="onRoomSelected($event)"></app-map-3d>
    <app-room-list *ngIf="view === 'rooms'" (roomSelected)="onRoomSelected($event)"></app-room-list>
    <app-room-detail *ngIf="view === 'room-detail' && selectedRoomId" [roomId]="selectedRoomId" (back)="closeRoomDetail()"></app-room-detail>
    <app-floor-manager *ngIf="view === 'floors'"></app-floor-manager>
    <app-staff-list *ngIf="view === 'staff'"></app-staff-list>
    <app-room-type-manager *ngIf="view === 'types-rooms'"></app-room-type-manager>
    <app-equipment-type-manager *ngIf="view === 'types-equipment'"></app-equipment-type-manager>
    <app-socket-type-manager *ngIf="view === 'types-sockets'"></app-socket-type-manager>
    <app-equipment-list *ngIf="view === 'equipments'"></app-equipment-list>
    <app-socket-list *ngIf="view === 'sockets'"></app-socket-list>
    <app-user-list *ngIf="view === 'users'"></app-user-list>
    <app-profile *ngIf="view === 'profile'"></app-profile>
  </main>
</ng-container>

<ng-template #loginTemplate>
  <app-login></app-login>
</ng-template>
