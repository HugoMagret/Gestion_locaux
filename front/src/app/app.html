<ng-container *ngIf="isAuthenticated; else loginTemplate">
  <nav class="top-nav">
    <div class="nav-brand">LocauxAdmin</div>
    <div class="nav-links">
      <button [class.active]="view === 'map'" (click)="view = 'map'">Plan 2D</button>
      <button [class.active]="view === 'rooms'" (click)="view = 'rooms'">Liste Salles</button>
      <button [class.active]="view === 'floors'" (click)="view = 'floors'">Gestion Étages</button>
      <button [class.active]="view === 'staff'" (click)="view = 'staff'">Personnel</button>
      <button [class.active]="view === 'types'" (click)="view = 'types'">Types de Salles</button>
      <button [class.active]="view === 'equipment-types'" (click)="view = 'equipment-types'">Types de Matériels</button>
      <button *ngIf="isAdmin" [class.active]="view === 'users'" (click)="view = 'users'">Utilisateurs</button>
      <button [class.active]="view === 'profile'" (click)="view = 'profile'">Mon Profil</button>
      <button class="logout-btn" (click)="logout()">Déconnexion</button>
    </div>
  </nav>

  <main>
    <app-map *ngIf="view === 'map'"></app-map>
    <app-room-list *ngIf="view === 'rooms'"></app-room-list>
    <app-floor-manager *ngIf="view === 'floors'"></app-floor-manager>
    <app-staff-list *ngIf="view === 'staff'"></app-staff-list>
    <app-room-type-manager *ngIf="view === 'types'"></app-room-type-manager>
    <app-equipment-type-manager *ngIf="view === 'equipment-types'"></app-equipment-type-manager>
    <app-user-list *ngIf="view === 'users'"></app-user-list>
    <app-profile *ngIf="view === 'profile'"></app-profile>
  </main>
</ng-container>

<ng-template #loginTemplate>
  <app-login></app-login>
</ng-template>
