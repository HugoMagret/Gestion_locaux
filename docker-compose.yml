services:
  # Base de données
  db:
    image: postgres:15
    container_name: gestion_locaux_db
    restart: always
    environment:
      POSTGRES_DB: gestion_locaux
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - ./dataBase/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data # pour enregistrement des données

  # Backend Node.js
  backend:
    build: ./back
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://user:password@db:5432/gestion_locaux

  # Frontend Angular
  frontend:
    build: ./front
    ports:
      - "4200:4200"
    volumes:
      - ./front:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true # Pour le live-reload sous Windows/Docker

  # Interface de gestion Base de Données
  pgadmin:
    image: dpage/pgadmin4
    container_name: gestion_locaux_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  pgdata:
