services:
  # Base de données
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: gestion_locaux
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data # pour enregistrement des données

  # # Backend Node.js
  # backend:
  #   build: ./backend
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - db
  #   environment:
  #     DATABASE_URL: postgres://user:password@db:5432/gestion_locaux

  # Frontend Angular
  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    volumes:
      - ./front:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true # Pour le live-reload sous Windows/Docker

volumes:
  pgdata:
